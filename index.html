<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container">
        <h1 class="title">I made a tic-tac-toe game! Be impressed!</h1>
        <h2 class="text"></h2>
        <p class="logger"></p>
        <button type="button" class="reset">Reset game</button>
        <div class="board"></div>


        <dialog id="start" closedby="any">
            <h2>Play tic-tac-toe with yourself! Fun!</h2>
            <form>
                <label for="player1">"Player One"-s name: <input type="text" id="player1"
                        value="**professor X**"></label>
                <label for="player2">"Player
                    Two"-s name: <input type="text" id="player2" value="**stOrm**"></label>
                <button type="button" class="submit">Done</button>
                <button type="button" class="cancel">Idc, use defaults ya nerd</button>
            </form>
        </dialog>

        <!-- <dialog id="resetgame">
            <h2>Do you want to pick new player names?</h2>
            <label for="player1">"Player One"-s name: <input type="text" id="player1" value="**professor X**"></label>
            <label for="player2">"Player
                Two"-s name: <input type="text" id="player2" value="**stOrm**"></label>
            <button type="button" class="submit">Done</button>
            <button type="button" class="cancel">OMG leave me alone</button>
        </dialog> -->

        <dialog id="gameover" closedby="any">
            <h2></h2>
            <h3>Would you like to play again?</h3>
            <button type="button" id="reset">Yeah</button><button type="button" id="cancel">No, leave me
                alone</button>
        </dialog>



    </div>


</body>

</html>
