<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container">
        <h1 class="text"></h1>
        <!-- how to make all messages appear? -->
        <p class="logger"></p>
        <button type="button" class="reset">Reset game</button>
        <div class="board"></div>
        <dialog id="gameover">
            <h2></h2>
            <h3>Would you like to play again?</h3>
            <button type="button" id="reset">Yeah</button><button type="button" id="cancel">No, leave me
                alone</button>
        </dialog>
    </div>


</body>

</html>
